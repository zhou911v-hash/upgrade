<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>智能楼宇照明监控系统 · 设计预览</title>
<style>
  :root {
    --bg-deep: #040812;
    --bg-dark: #070E1E;
    --bg: #0A1628;
    --bg-card: #0F1E36;
    --bg-light: #152942;
    --bg-highlight: #1C3555;
    --primary-light: #1E3A5F;
    --accent: #00E5FF;
    --accent-dark: #00A8CC;
    --accent-light: #7BE4FF;
    --success: #00FF88;
    --warning: #FFB020;
    --danger: #FF3B5C;
    --info: #4DD0FF;
    --text-primary: #E8F4FF;
    --text-secondary: #8AA9C9;
    --text-muted: #4A6880;
    --grid-line: #14283E;
    --grid-dot: #1E3A5F;
    --mono: "Cascadia Code", "Consolas", "JetBrains Mono", "Menlo", "Monaco", monospace;
    --display: "Segoe UI Variable", "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--display);
    font-size: 14px;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  /* ========= 窗口壳 ========= */
  .win {
    width: 1440px;
    height: 820px;
    margin: 0 auto;
    position: relative;
    background: radial-gradient(ellipse at 50% 30%, #0F2142 0%, #0A1628 70%, #070E1E 100%);
    border: 1px solid var(--primary-light);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 229, 255, 0.25);
  }
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.5;
    pointer-events: none;
  }
  .dot-bg {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, var(--grid-dot) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.4;
    pointer-events: none;
  }
  /* ========= 顶栏 ========= */
  .topbar {
    height: 56px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--primary-light);
    display: flex;
    align-items: center;
    padding: 0 20px;
    position: relative;
    z-index: 10;
  }
  .topbar::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 200px; height: 2px;
    background: linear-gradient(90deg, transparent, transparent 20%, var(--accent) 50%, transparent 80%, transparent);
    animation: scanline 6s ease-in-out infinite;
  }
  @keyframes scanline {
    0%   { transform: translateX(-200px); }
    100% { transform: translateX(1440px); }
  }
  .logo {
    width: 26px; height: 26px; border-radius: 3px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #041018; font-weight: 700; font-size: 15px;
    font-family: var(--mono);
    box-shadow: 0 0 24px rgba(0, 229, 255, 0.75);
    animation: glow 2.4s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 16px rgba(0, 229, 255, 0.5); }
    to   { box-shadow: 0 0 34px rgba(0, 229, 255, 1); }
  }
  .brand {
    margin-left: 14px;
    display: flex; flex-direction: column;
  }
  .brand-row { display: flex; align-items: center; gap: 12px; }
  .brand-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .brand-sep { width: 1px; height: 12px; background: var(--primary-light); }
  .brand-code { font-size: 10px; font-weight: 700; color: var(--accent); font-family: var(--mono); }
  .brand-sub { font-size: 10px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }
  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 14px;
  }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 0;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    animation: pulse 1.1s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 1; }
    to   { opacity: 0.4; }
  }
  .dot.online { background: var(--success); box-shadow: 0 0 12px var(--success); }
  .dot.accent { background: var(--accent); box-shadow: 0 0 14px var(--accent); animation-duration: 1.4s; }
  .dot.warn { background: var(--warning); box-shadow: 0 0 12px var(--warning); }
  .dot.danger { background: var(--danger); box-shadow: 0 0 12px var(--danger); animation-duration: 0.5s; }
  .status-text { font-size: 10px; font-weight: 700; font-family: var(--mono); color: var(--success); }
  .sep { width: 1px; height: 16px; background: var(--primary-light); }
  .user-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .user-role {
    background: rgba(28, 53, 85, 0.15);
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 3px 8px;
    font-size: 10px; font-weight: 700; font-family: var(--mono);
    color: var(--accent);
  }
  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 5px 10px;
    font-size: 10px; font-weight: 700; font-family: var(--display);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .btn.primary {
    background: var(--accent);
    color: #041018;
    border: none;
  }
  .btn.success { background: var(--success); color: #041A10; border: none; }
  .btn.danger { background: var(--danger); color: #2A0510; border: none; }
  .btn.warning { background: var(--warning); color: #1A0E00; border: none; }
  .btn.ghost { border: 1px solid var(--primary-light); color: var(--text-secondary); }
  .titlebar-btn {
    width: 40px; height: 32px;
    background: transparent; border: none; border-radius: 3px;
    color: var(--text-secondary);
    font-size: 14px; font-family: var(--mono);
    cursor: pointer;
  }
  /* ========= 主体 ========= */
  .body {
    display: flex;
    height: calc(820px - 56px);
    position: relative;
    z-index: 5;
  }
  /* ========= 侧栏 ========= */
  .sidebar {
    width: 230px;
    background: var(--bg-card);
    border-right: 1px solid var(--primary-light);
    padding: 20px 0 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .sidebar-group {
    padding-left: 20px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
    margin-top: 22px;
  }
  .sidebar-group:first-child { margin-top: 0; }
  .sidebar-group-label {
    font-size: 10px; font-weight: 700; color: var(--accent);
    font-family: var(--mono); letter-spacing: 0.5px;
  }
  .nav-item {
    display: flex; align-items: center;
    margin: 0 0 4px 8px;
    padding: 11px 16px;
    border-radius: 2px;
    color: var(--text-secondary);
    font-size: 13px; font-weight: 600;
    cursor: pointer; position: relative;
  }
  .nav-item:hover {
    background: var(--bg-light);
    color: var(--accent);
  }
  .nav-item.active {
    background: var(--bg-highlight);
    color: var(--accent);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: -8px; top: 6px; bottom: 6px;
    width: 3px; border-radius: 0 2px 2px 0;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .nav-icon {
    margin-right: 8px;
    font-size: 14px;
  }
  .sidebar-version {
    margin: 0 20px;
    background: rgba(15, 30, 54, 0.2);
    border: 1px solid var(--primary-light);
    border-radius: 3px;
    padding: 10px 12px;
  }
  .version-row { display: flex; gap: 6px; align-items: center; }
  .version-num { font-size: 10px; font-weight: 700; color: var(--accent); font-family: var(--mono); }
  .version-build { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }
  .version-author { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  /* ========= 内容区 ========= */
  .content {
    flex: 1;
    background: var(--bg-dark);
    padding: 24px 30px;
    overflow: auto;
    position: relative;
  }
  .content .dot-bg {
    position: absolute;
    inset: 0;
    opacity: 0.4;
  }
  /* ========= 页面Header（PageHeader 控件） ========= */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 22px;
    position: relative;
    z-index: 2;
  }
  .page-header-left { display: flex; flex-direction: column; }
  .page-header-code {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .page-header-code-text {
    font-size: 10px; font-weight: 700; color: var(--accent);
    font-family: var(--mono);
  }
  .page-header-divider { width: 100px; height: 1px; background: var(--primary-light); }
  .page-title-row { display: flex; align-items: center; }
  .page-title-bar {
    width: 3px; height: 24px;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
    margin-right: 12px;
  }
  .page-title {
    font-size: 28px; font-weight: 300;
    color: var(--text-primary);
  }
  .page-subtitle {
    margin-left: 15px; margin-top: 6px;
    font-size: 13px; color: var(--text-muted);
  }
  /* ========= 卡片 ========= */
  .card {
    background: linear-gradient(180deg, rgba(20, 30, 54, 0.34) 0%, rgba(15, 30, 54, 1) 100%);
    border: 1px solid var(--primary-light);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 18px;
    position: relative;
  }
  .card.top-accent::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.5;
  }
  /* 四角斜切装饰 */
  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border: 1.5px solid var(--accent);
  }
  .corner.tl { top: 4px; left: 4px; border-right: none; border-bottom: none; }
  .corner.tr { top: 4px; right: 4px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 4px; left: 4px; border-right: none; border-top: none; }
  .corner.br { bottom: 4px; right: 4px; border-left: none; border-top: none; }
  /* ========= HUD 数据卡片 ========= */
  .hud-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .hud-card {
    background: linear-gradient(180deg, rgba(20, 30, 54, 0.34) 0%, rgba(15, 30, 54, 1) 100%);
    border: 1px solid var(--primary-light);
    border-radius: 4px;
    padding: 20px 16px;
    position: relative;
  }
  .hud-card-bar {
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent);
    opacity: 0.55;
  }
  .hud-card-title {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .hud-card-icon { color: var(--accent); font-size: 11px; }
  .hud-card-label {
    font-size: 11px; font-weight: 700;
    color: var(--text-secondary);
    font-family: var(--mono);
  }
  .hud-card-value {
    font-family: var(--mono);
    font-size: 32px; font-weight: 700;
    color: var(--text-primary);
    display: flex; align-items: baseline; gap: 6px;
  }
  .hud-card-value .unit {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 600;
  }
  .hud-card-value.accent { color: var(--accent); text-shadow: 0 0 10px rgba(0, 229, 255, 0.55); }
  .hud-card-value.success { color: var(--success); text-shadow: 0 0 10px rgba(0, 255, 136, 0.55); }
  .hud-card-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px;
  }
  .hud-card-footer-cn {
    font-size: 11px; color: var(--text-secondary);
  }
  .hud-card-footer-no {
    font-size: 10px; font-weight: 700;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  /* 子 accent 色 */
  .hud-card .corner.tl, .hud-card .corner.tr,
  .hud-card .corner.bl, .hud-card .corner.br { border-color: var(--accent); }
  .hud-card.info .hud-card-bar, .hud-card.info .corner.tl, .hud-card.info .corner.tr, .hud-card.info .corner.bl, .hud-card.info .corner.br { border-color: var(--info); }
  .hud-card.info .hud-card-bar { background: var(--info); }
  .hud-card.success .hud-card-bar { background: var(--success); }
  .hud-card.success .corner.tl, .hud-card.success .corner.tr, .hud-card.success .corner.bl, .hud-card.success .corner.br { border-color: var(--success); }
  /* ========= 图表占位 ========= */
  .chart-placeholder {
    height: 240px;
    background: linear-gradient(180deg, rgba(0, 229, 255, 0.04) 0%, transparent 100%);
    border: 1px dashed var(--primary-light);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    position: relative;
  }
  .chart-line {
    width: 100%; height: 100%;
    padding: 20px;
    display: flex; align-items: flex-end;
    gap: 3%;
  }
  .chart-line .bar {
    flex: 1; background: linear-gradient(180deg, var(--accent) 0%, rgba(0, 229, 255, 0.2) 100%);
    border-radius: 2px 2px 0 0;
  }
  .section-title-en {
    font-size: 10px; font-weight: 700;
    color: var(--accent);
    font-family: var(--mono);
    margin-bottom: 2px;
  }
  .section-title {
    font-size: 16px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
  }
  /* 导航图标 */
  .nav-icon { width: 16px; color: var(--text-secondary); display: inline-block; text-align: center; }
  .nav-item.active .nav-icon { color: var(--accent); }
  /* 登录页特殊样式 */
  .login-win {
    width: 980px; height: 640px;
    margin: 90px auto;
    position: relative;
    background: var(--bg-deep);
    border: 1px solid var(--primary-light);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 48px rgba(0, 229, 255, 0.28);
    display: flex;
  }
  .login-left {
    width: 58%;
    background: linear-gradient(135deg, #0A1628 0%, #152942 50%, #0F1E36 100%);
    padding: 56px;
    position: relative;
    display: flex; flex-direction: column; justify-content: center;
    overflow: hidden;
  }
  .login-circles {
    position: absolute;
    right: 40px; bottom: 40px;
    width: 320px; height: 320px;
  }
  .login-circles .c { position: absolute; border-radius: 50%; }
  .login-circles .c1 { inset: 0; border: 1px solid rgba(0, 229, 255, 0.12); }
  .login-circles .c2 { inset: 45px; border: 1px solid rgba(0, 229, 255, 0.19); }
  .login-circles .c3 { inset: 90px; border: 1px solid rgba(0, 229, 255, 0.27); }
  .login-big-logo {
    position: relative;
    width: 64px; height: 64px;
    border-radius: 6px; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 0 28px rgba(0, 229, 255, 0.75);
    animation: glow 2.4s ease-in-out infinite alternate;
  }
  .login-big-logo::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: ripple 2.2s ease-out infinite;
  }
  @keyframes ripple {
    0%   { transform: scale(0.7); opacity: 0.9; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .login-right {
    width: 42%;
    background: var(--bg-card);
    padding: 40px 50px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
  }
  .input {
    width: 100%;
    background: var(--bg-dark);
    border: 1px solid var(--primary-light);
    color: var(--text-primary);
    padding: 11px 14px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    margin-bottom: 20px;
  }
  .input:focus { border-color: var(--accent); }
  .form-label {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
    font-size: 11px; font-weight: 700;
    color: var(--text-secondary);
    font-family: var(--mono);
  }
  .form-label .arrow { color: var(--accent); }
  /* ========= 楼层监控特殊 ========= */
  .canvas-area {
    height: 500px;
    background: var(--bg-dark);
    border: 1px solid var(--primary-light);
    border-radius: 3px;
    padding: 12px;
    position: relative;
    overflow: hidden;
  }
  .radar-scan {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, transparent 0%, rgba(0, 229, 255, 0.75) 50%, transparent 100%);
    filter: blur(3px);
    pointer-events: none;
    animation: radar-scan 4.5s ease-in-out infinite;
    z-index: 3;
  }
  @keyframes radar-scan {
    0%   { left: 0; }
    100% { left: calc(100% - 2px); }
  }
  .area-block {
    position: absolute;
    background: rgba(28, 53, 85, 0.3);
    border: 1px solid var(--primary-light);
    border-radius: 3px;
    padding: 10px;
    font-size: 12px;
    color: var(--text-primary);
    font-weight: 600;
  }
  .area-block .type {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    margin-top: 4px;
  }
  .area-block.highlight { background: rgba(0, 229, 255, 0.25); border-color: var(--accent); }
  .circuit-node {
    position: absolute;
    width: 28px; height: 28px;
    border: 1.5px solid currentColor;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .circuit-node::before {
    content: '';
    width: 12px; height: 12px;
    background: currentColor; border-radius: 50%;
    box-shadow: 0 0 10px currentColor;
  }
  .circuit-node::after {
    content: '';
    position: absolute;
    inset: -8px;
    background: currentColor; opacity: 0.25;
    border-radius: 50%;
  }
  .node-on { color: var(--success); }
  .node-off { color: var(--text-muted); }
  .node-fault { color: var(--danger); }
  .node-warn { color: var(--warning); }
  /* 3D viewport */
  .viewport-3d {
    background: #07101E;
    height: 580px;
    border: 1px solid var(--primary-light);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .viewport-3d::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 64px 64px;
    transform: perspective(500px) rotateX(60deg) scale(1.5) translateY(20%);
    opacity: 0.5;
  }
  .viewport-3d .building {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%) perspective(1000px) rotateX(20deg) rotateY(-25deg);
    display: flex; flex-direction: column;
    gap: 6px;
  }
  .viewport-3d .floor3d {
    width: 320px; height: 50px;
    background: linear-gradient(180deg, rgba(0, 229, 255, 0.15) 0%, rgba(0, 229, 255, 0.05) 100%);
    border: 1px solid rgba(0, 229, 255, 0.6);
    border-radius: 3px;
    position: relative;
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
  }
  .viewport-3d .floor3d::before {
    content: '';
    position: absolute;
    inset: 10px;
    background-image: radial-gradient(circle, var(--accent) 1px, transparent 2px);
    background-size: 30px 30px;
    opacity: 0.6;
  }
  .viewport-hud-tl, .viewport-hud-br {
    position: absolute;
    background: rgba(15, 30, 54, 0.8);
    border: 1px solid var(--accent);
    border-radius: 2px;
    padding: 4px 8px;
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; font-family: var(--mono); font-weight: 700;
    color: var(--accent);
  }
  .viewport-hud-tl { top: 14px; left: 14px; }
  .viewport-hud-br { bottom: 14px; right: 14px; border-color: var(--primary-light); color: var(--text-muted); }
  .viewport-hud-br .num { color: var(--accent); }
  /* ========= DataGrid ========= */
  .dg-wrap { border: 1px solid var(--primary-light); border-radius: 4px; background: linear-gradient(180deg, rgba(20, 30, 54, 0.34) 0%, rgba(15, 30, 54, 1) 100%); position: relative; padding: 10px; }
  table.dg { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  .dg th {
    background: var(--bg-light);
    color: var(--accent);
    padding: 11px 14px;
    text-align: left;
    font-size: 11px; font-weight: 700;
    border-bottom: 1px solid var(--accent-dark);
  }
  .dg td {
    padding: 10px 14px;
    color: var(--text-primary);
    border-bottom: 1px solid var(--grid-line);
  }
  .dg tr:nth-child(even) td { background: rgba(21, 41, 66, 0.4); }
  .dg tr:hover td { background: var(--bg-light); }
  .pill {

// 返回一个伪随机 sparkline SVG points 字符串
function sparkline(count, min, range, seed) {
  return sparklinePath(count, min, range, seed);
}
function sparklinePath(count, minRatio, rangeRatio, seed) {
  let s = seed || 1;
  const pts = [];
  for (let i = 0; i < count; i++) {
    // 伪随机
    s = (s * 9301 + 49297) % 233280;
    const r = s / 233280;
    const y = 24 - (minRatio + r * rangeRatio) * 22;
    const x = (i / (count - 1)) * 100;
    pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
  }
  return pts.join(' ');
}
function hudCard(label, icon, value, unit, cn, no, color = '', glow = false, accentVal = false) {
  const glowStyle = accentVal
    ? 'color:var(--accent);text-shadow:0 0 10px rgba(0,229,255,0.55)'
    : glow && color === 'success' ? 'color:var(--success);text-shadow:0 0 10px rgba(0,255,136,0.55)' : '';
  return `
    <div class="hud-card ${color}">
      <div class="hud-card-bar"></div>
      <div class="corner tl"></div>
      <div class="corner br"></div>
      <div style="padding:4px">
        <div class="hud-card-title">

          <span class="hud-card-label">${label}</span>

        <div class="hud-card-footer">
          <span class="hud-card-footer-cn">${cn}</span>
          <span class="hud-card-footer-no">${no}</span>
        </div>
      </div>
    </div>
  `;
}
function corners(n = 2) {

function statBox(label, value, style, unit = '') {
  const colors = { success: 'var(--success)', muted: 'var(--text-primary)', warn: 'var(--warning)', accent: 'var(--accent)' };
  const labelColors = { success: 'var(--success)', muted: 'var(--text-muted)', warn: 'var(--warning)', accent: 'var(--accent)' };
  const shadow = style === 'success' ? 'text-shadow:0 0 8px rgba(0,255,136,0.55)' : style === 'accent' ? 'text-shadow:0 0 8px rgba(0,229,255,0.55)' : '';
  return `
    <div style="background:var(--bg-light);border:1px solid var(--primary-light);border-radius:3px;padding:10px 12px">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:${labelColors[style]}">${label}</div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-top:4px">
        <span style="font-family:var(--mono);font-size:22px;font-weight:700;color:${colors[style]};${shadow}">${value}</span>
        ${unit ? `<span style="font-family:var(--mono);font-size:13px;color:var(--text-secondary)">${unit}</span>` : ''}
      </div>
    </div>
  `;
}
